services:
  citytrip-allinone:
    image: ${DOCKERHUB_IMAGE:-yourname/citytrip-allinone}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VCS_REF: "${VCS_REF:-local}"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
        VITE_AMAP_JS_API_KEY: "${VITE_AMAP_JS_API_KEY:-}"
        VITE_AMAP_SECURITY_JS_CODE: "${VITE_AMAP_SECURITY_JS_CODE:-}"
        VITE_AMAP_MAP_STYLE: "${VITE_AMAP_MAP_STYLE:-}"
        VITE_AMAP_JS_API_URL: "${VITE_AMAP_JS_API_URL:-}"
        VITE_AMAP_JS_API_VERSION: "${VITE_AMAP_JS_API_VERSION:-}"
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    container_name: citytrip-allinone
    restart: unless-stopped
    ports:
      - "${HOST_HTTP_PORT:-80}:80"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      SERVER_PORT: "${APP_PORT:-8081}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"
      APP_DB_NAME: "${APP_DB_NAME:-city_trip_db}"
      APP_DB_USERNAME: "${APP_DB_USERNAME:-citytrip}"
      APP_DB_PASSWORD: "${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
      APP_JWT_SECRET: "${APP_JWT_SECRET:?APP_JWT_SECRET is required}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      APP_AUTH_MAIL_FROM: "${APP_AUTH_MAIL_FROM:-noreply@050923.xyz}"
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: "${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-https://www.050923.xyz,https://050923.xyz,http://localhost:*,http://127.0.0.1:*}"
      APP_DB_VERIFY_ON_STARTUP: "${APP_DB_VERIFY_ON_STARTUP:-true}"
      APP_REDIS_ENABLED: "${APP_REDIS_ENABLED:-true}"
      APP_REQUIRE_EXTERNAL_SERVICES: "${APP_REQUIRE_EXTERNAL_SERVICES:-true}"
      APP_BOOTSTRAP_ADMIN_ENABLED: "${APP_BOOTSTRAP_ADMIN_ENABLED:-false}"
      APP_BOOTSTRAP_ADMIN_USERNAME: "${APP_BOOTSTRAP_ADMIN_USERNAME:-admin}"
      APP_BOOTSTRAP_ADMIN_PASSWORD: "${APP_BOOTSTRAP_ADMIN_PASSWORD:-}"
      APP_BOOTSTRAP_ADMIN_SYNC_PASSWORD: "${APP_BOOTSTRAP_ADMIN_SYNC_PASSWORD:-false}"
      DB_USERNAME: "${DB_USERNAME:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      LLM_OPENAI_ENABLED: "${LLM_OPENAI_ENABLED:-true}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4}"
      OPENAI_CHAT_MODEL: "${OPENAI_CHAT_MODEL:-}"
      OPENAI_TEXT_MODEL: "${OPENAI_TEXT_MODEL:-}"
      OPENAI_TOOL_MODEL: "${OPENAI_TOOL_MODEL:-}"
      APP_GEO_ENABLED: "${APP_GEO_ENABLED:-true}"
      APP_GEO_BASE_URL: "${APP_GEO_BASE_URL:-}"
      APP_GEO_API_KEY: "${APP_GEO_API_KEY:-}"
      APP_GEO_API_KEY_QUERY_NAME: "${APP_GEO_API_KEY_QUERY_NAME:-key}"
      APP_GEO_API_KEY_HEADER_NAME: "${APP_GEO_API_KEY_HEADER_NAME:-}"
      APP_GEO_KEYWORD_PATH: "${APP_GEO_KEYWORD_PATH:-/geo/search}"
      APP_GEO_NEARBY_PATH: "${APP_GEO_NEARBY_PATH:-/geo/nearby}"
      APP_GEO_GEOCODE_PATH: "${APP_GEO_GEOCODE_PATH:-/geo/geocode}"
      APP_GEO_ROUTE_PATH: "${APP_GEO_ROUTE_PATH:-}"
      APP_AMAP_ENABLED: "${APP_AMAP_ENABLED:-true}"
      APP_AMAP_BASE_URL: "${APP_AMAP_BASE_URL:-https://restapi.amap.com}"
      APP_AMAP_API_KEY: "${APP_AMAP_API_KEY:-}"
      APP_AMAP_SECURITY_KEY: "${APP_AMAP_SECURITY_KEY:-}"
      APP_AMAP_SIGN_REQUESTS: "${APP_AMAP_SIGN_REQUESTS:-false}"
      APP_AMAP_CONNECT_TIMEOUT_MS: "${APP_AMAP_CONNECT_TIMEOUT_MS:-1500}"
      APP_AMAP_READ_TIMEOUT_MS: "${APP_AMAP_READ_TIMEOUT_MS:-5000}"
      APP_PLANNING_AI_TIMEOUT_MS: "${APP_PLANNING_AI_TIMEOUT_MS:-25000}"
      LLM_PROVIDER: "${LLM_PROVIDER:-real}"
      LLM_FALLBACK_TO_MOCK: "${LLM_FALLBACK_TO_MOCK:-false}"
      JAVA_OPTS: "${JAVA_OPTS:--Xms512m -Xmx1024m}"
    volumes:
      - citytrip_data:/opt/citytrip/data

volumes:
  citytrip_data:
