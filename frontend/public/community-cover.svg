<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Community route cover</title>
  <desc id="desc">A city route illustration used as the default community cover.</desc>
  <defs>
