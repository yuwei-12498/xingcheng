user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;
    client_max_body_size 20m;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Cloudflare Flexible SSL: the browser-to-Cloudflare side is HTTPS, but
    # Cloudflare-to-origin is HTTP. Preserve Cloudflare's forwarded proto when
    # present, and do not configure local 443 or origin-side HTTPS redirects.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    upstream citytrip_backend {
        server 127.0.0.1:8081;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }

    server {
        listen 80;
        server_name www.050923.xyz 050923.xyz;

        root /usr/share/nginx/html;
        index index.html;

        location = /api/chat/messages/stream {
            proxy_pass http://citytrip_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://citytrip_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_read_timeout 600s;
        }

        # Vue Router history mode fallback. Real files are served first; unknown
        # front-end routes fall back to index.html.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
